# Configuration Nginx pour le sous-domaine api-medical.cormarin.com
# À copier dans /etc/nginx/sites-available/api-medical.cormarin.com sur le VPS 176.31.163.141

server {
    listen 80;
    server_name api-medical.cormarin.com;

    # Redirection automatique vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-medical.cormarin.com;

    # Configuration SSL (Let's Encrypt / Certbot gérera ces fichiers)
    ssl_certificate /etc/letsencrypt/live/api-medical.cormarin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-medical.cormarin.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3005; # Redirige vers notre conteneur Next.js API
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gestion des CORS pour autoriser www.cormarin.com
        add_header 'Access-Control-Allow-Origin' 'https://www.cormarin.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}
